version: "3.9"

services:
  next-app:
    image: node:22
    container_name: next-app
    working_dir: /app
    volumes:
      - ./aitrade:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3010:3000"  # acces direct Next.js pe 3010
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - next-app
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    # port mapping removed to avoid conflicts
    restart: always